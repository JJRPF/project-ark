<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="referrer" content="no-referrer">
  <title>Project Ark — Offline Knowledge Node</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="shell chat-shell">

    <header class="hero hero-compact">
      <div class="hero-row">
        <div class="logo logo-sm" aria-hidden="true"><span class="logo-glyph">▲</span></div>
        <div>
          <h1 class="hero-inline">PROJECT <span class="accent">ARK</span></h1>
          <p class="subtag">
            <code>{{ model }}</code> &middot;
            <a href="http://{{ request.host.split(':')[0] }}:8080" class="navlink" target="_blank">browse archives</a> &middot;
            <a href="/admin" class="navlink">admin</a>
          </p>
        </div>
      </div>
    </header>

    <!-- Slow response warning -->
    <div class="chat-warning" aria-live="polite">
      ⚠️ Running locally — responses may take 30–60 seconds. Please be patient.
    </div>

    <!-- Chat log -->
    <section id="chat-log" class="chat-log" aria-live="polite" aria-label="Conversation">
      <div class="chat-welcome">
        <p>Ask a survival, medical, or practical question. Follow-up questions use the conversation history.</p>
      </div>
    </section>

    <!-- Input bar (pinned to bottom) -->
    <div class="chat-input-bar">
      <form id="ark-form" autocomplete="off">
        <div class="chat-input-row">
          <label for="query" class="sr-only">Your question</label>
          <textarea id="query" name="query" rows="1"
            placeholder="Ask a question…"
            maxlength="500" required></textarea>
          <button type="submit" id="submit-btn" title="Send">
            <span class="btn-label">&#9654;</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>
      </form>
      <div class="chat-toolbar">
        <button type="button" id="clear-btn" class="btn-ghost btn-xs" title="Clear conversation">Clear chat</button>
        <a href="http://{{ request.host.split(':')[0] }}:8080" class="navlink" target="_blank">Kiwix home</a>
      </div>
    </div>

  </main>

  <script>
  (function () {
    const form    = document.getElementById('ark-form');
    const queryEl = document.getElementById('query');
    const btn     = document.getElementById('submit-btn');
    const chatLog = document.getElementById('chat-log');
    const clearBtn = document.getElementById('clear-btn');

    // Conversation history sent to the backend on each turn.
    let history = [];    // [{role: "user", content}, {role: "assistant", content}]
    let lastSource = null;  // URL of the last article used — sent on follow-ups

    const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function renderMd(text) {
      const lines = esc(text).split(/\r?\n/);
      let html = '', inList = false;
      for (const raw of lines) {
        const line = raw.trimEnd();
        const bullet = line.match(/^\s*[-*•]\s+(.*)$/);
        if (bullet) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += '<li>' + bullet[1] + '</li>';
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          if (line.trim()) html += '<p>' + line + '</p>';
        }
      }
      if (inList) html += '</ul>';
      return html || '<p><em>(empty)</em></p>';
    }

    function addBubble(role, content, meta) {
      // Remove welcome message on first real bubble.
      const welcome = chatLog.querySelector('.chat-welcome');
      if (welcome) welcome.remove();

      const bubble = document.createElement('div');
      bubble.className = 'bubble bubble-' + role;

      if (role === 'user') {
        bubble.innerHTML = '<p>' + esc(content) + '</p>';
      } else if (role === 'error') {
        bubble.innerHTML = '<p class="bubble-error">' + esc(content) + '</p>';
      } else {
        bubble.innerHTML = renderMd(content);
        if (meta && meta.source) {
          const det = document.createElement('details');
          det.className = 'source';
          det.innerHTML = '<summary>Source</summary>'
            + '<a href="' + esc(meta.source) + '" target="_blank" rel="noopener">'
            + esc(meta.source) + '</a>';
          bubble.appendChild(det);
        }
      }
      chatLog.appendChild(bubble);
      bubble.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return bubble;
    }

    function addThinking() {
      const el = document.createElement('div');
      el.className = 'bubble bubble-assistant bubble-thinking';
      el.innerHTML = '<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';
      chatLog.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return el;
    }

    function setLoading(on) {
      btn.disabled = on;
      btn.classList.toggle('loading', on);
      queryEl.disabled = on;
    }

    // Auto-resize textarea to content (1–4 lines).
    queryEl.addEventListener('input', () => {
      queryEl.style.height = 'auto';
      queryEl.style.height = Math.min(queryEl.scrollHeight, 120) + 'px';
    });

    // Submit on Enter (Shift+Enter for newline).
    queryEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event('submit', { cancelable: true }));
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const q = queryEl.value.trim();
      if (!q) return;

      addBubble('user', q);
      queryEl.value = '';
      queryEl.style.height = 'auto';
      setLoading(true);

      const thinking = addThinking();

      try {
        const resp = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q, history: history, last_source: lastSource })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let resultBuffer = '';
        let lastAnswer = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          resultBuffer += decoder.decode(value, { stream: true });
          const lines = resultBuffer.split('\n');
          resultBuffer = lines.pop(); // keep partial line
          
          for (const line of lines) {
            if (!line.trim()) continue;
            try {
              const data = JSON.parse(line);
              if (data.type === 'status') {
                 thinking.innerHTML = `<div class="chat-bubble assistant thinking"><div class="dots"><span></span><span></span><span></span></div><div style="margin-left: 10px; font-size: 0.9em; color: var(--text-muted); opacity: 0.8;">${esc(data.message)}</div></div>`;
              } else if (data.type === 'result' || data.error) {
                 lastAnswer = data;
              }
            } catch (e) {
               console.error("Error parsing NDJSON:", line, e);
            }
          }
        }
        
        thinking.remove();

        if (lastAnswer && lastAnswer.ok) {
          history.push({ role: 'user', content: q });
          history.push({ role: 'assistant', content: lastAnswer.answer });
          if (lastAnswer.source) lastSource = lastAnswer.source;
          addBubble('assistant', lastAnswer.answer, { source: lastAnswer.source });
        } else if (lastAnswer && lastAnswer.error) {
          addBubble('error', lastAnswer.error);
        } else if (!resp.ok) {
          addBubble('error', 'Request failed (' + resp.status + ').');
        }
      } catch (err) {
        thinking.remove();
        addBubble('error', 'Could not reach the Ark. The node may be offline.');
      } finally {
        setLoading(false);
        queryEl.focus();
      }
    });

    clearBtn.addEventListener('click', async () => {
      try {
        await fetch('/api/clear-history', { method: 'POST' });
      } catch (e) {
        log('Warning: could not clear backend history.');
      }
      history = [];
      lastSource = null;
      chatLog.innerHTML = '<div class="chat-welcome"><p>Conversation cleared. Ask a new question.</p></div>';
    });

  })();
  </script>
</body>
</html>
