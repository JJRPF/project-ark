<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="referrer" content="no-referrer">
  <title>Project Ark — Offline Knowledge Node</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="shell chat-shell">

    <header class="hero hero-compact">
      <div class="hero-row">
        <div class="logo logo-sm" aria-hidden="true"><span class="logo-glyph">▲</span></div>
        <div>
          <h1 class="hero-inline">PROJECT <span class="accent">ARK</span></h1>
          <p class="subtag">
            <code>{{ model }}</code> &middot;
            <a href="http://{{ request.host.split(':')[0] }}:8080" class="navlink" target="_blank">browse archives</a> &middot;
            <a href="/admin" class="navlink">admin</a>
          </p>
        </div>
      </div>
    </header>

    <!-- Slow response warning -->
    <div class="chat-warning" aria-live="polite">
      ⚠️ Running locally — responses may take 30–60 seconds. Please be patient.
    </div>

    <!-- Chat log -->
    <section id="chat-log" class="chat-log" aria-live="polite" aria-label="Conversation">
      <div class="chat-welcome">
        <p>Ask a survival, medical, or practical question. Follow-up questions use the conversation history.</p>
      </div>
    </section>

    <!-- Article picker modal -->
    <div id="article-picker-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Pick an Article</h2>
          <button type="button" class="modal-close" id="modal-close-btn" title="Close">✕</button>
        </div>
        <div id="article-list" class="article-list"></div>
      </div>
    </div>

    <!-- Input bar (pinned to bottom) -->
    <div class="chat-input-bar">
      <form id="ark-form" autocomplete="off">
        <div class="chat-input-row">
          <label for="query" class="sr-only">Your question</label>
          <textarea id="query" name="query" rows="1"
            placeholder="Ask a question…"
            maxlength="500" required></textarea>
          <button type="submit" id="submit-btn" title="Send">
            <span class="btn-label">&#9654;</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>
      </form>
      <div class="chat-toolbar">
        <button type="button" id="clear-btn" class="btn-ghost btn-xs" title="Clear conversation">Clear chat</button>
        <a href="http://{{ request.host.split(':')[0] }}:8080" class="navlink" target="_blank">Kiwix home</a>
      </div>
    </div>

  </main>

  <script>
  (function () {
    const form    = document.getElementById('ark-form');
    const queryEl = document.getElementById('query');
    const btn     = document.getElementById('submit-btn');
    const chatLog = document.getElementById('chat-log');
    const clearBtn = document.getElementById('clear-btn');

    // Conversation history sent to the backend on each turn.
    let history = [];  // [{role: "user", content}, {role: "assistant", content}]

    const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function renderMd(text) {
      const lines = esc(text).split(/\r?\n/);
      let html = '', inList = false;
      for (const raw of lines) {
        const line = raw.trimEnd();
        const bullet = line.match(/^\s*[-*•]\s+(.*)$/);
        if (bullet) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += '<li>' + bullet[1] + '</li>';
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          if (line.trim()) html += '<p>' + line + '</p>';
        }
      }
      if (inList) html += '</ul>';
      return html || '<p><em>(empty)</em></p>';
    }

    function addBubble(role, content, meta) {
      // Remove welcome message on first real bubble.
      const welcome = chatLog.querySelector('.chat-welcome');
      if (welcome) welcome.remove();

      const bubble = document.createElement('div');
      bubble.className = 'bubble bubble-' + role;

      if (role === 'user') {
        bubble.innerHTML = '<p>' + esc(content) + '</p>';
      } else if (role === 'error') {
        bubble.innerHTML = '<p class="bubble-error">' + esc(content) + '</p>';
      } else {
        bubble.innerHTML = renderMd(content);
        if (meta && meta.source) {
          const det = document.createElement('details');
          det.className = 'source';
          det.innerHTML = '<summary>Source</summary>'
            + '<a href="' + esc(meta.source) + '" target="_blank" rel="noopener">'
            + esc(meta.source) + '</a>';
          bubble.appendChild(det);
        }
      }
      chatLog.appendChild(bubble);
      bubble.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return bubble;
    }

    function addThinking() {
      const el = document.createElement('div');
      el.className = 'bubble bubble-assistant bubble-thinking';
      el.innerHTML = '<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';
      chatLog.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return el;
    }

    function setLoading(on) {
      btn.disabled = on;
      btn.classList.toggle('loading', on);
      queryEl.disabled = on;
    }

    // Auto-resize textarea to content (1–4 lines).
    queryEl.addEventListener('input', () => {
      queryEl.style.height = 'auto';
      queryEl.style.height = Math.min(queryEl.scrollHeight, 120) + 'px';
    });

    // Submit on Enter (Shift+Enter for newline).
    queryEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event('submit', { cancelable: true }));
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const q = queryEl.value.trim();
      if (!q) return;

      addBubble('user', q);
      queryEl.value = '';
      queryEl.style.height = 'auto';
      setLoading(true);

      const thinking = addThinking();

      try {
        const resp = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q, history: history })
        });
        const data = await resp.json().catch(() => ({}));
        thinking.remove();

        if (!resp.ok || !data.ok) {
          addBubble('error', data.error || ('Request failed (' + resp.status + ').'));
        } else {
          history.push({ role: 'user', content: q });
          history.push({ role: 'assistant', content: data.answer });
          addBubble('assistant', data.answer, { source: data.source });
        }
      } catch (err) {
        thinking.remove();
        addBubble('error', 'Could not reach the Ark. The node may be offline.');
      } finally {
        setLoading(false);
        queryEl.focus();
      }
    });

    clearBtn.addEventListener('click', async () => {
      try {
        await fetch('/api/clear-history', { method: 'POST' });
      } catch (e) {
        log('Warning: could not clear backend history.');
      }
      history = [];
      chatLog.innerHTML = '<div class="chat-welcome"><p>Conversation cleared. Ask a new question.</p></div>';
    });

    // Article picker modal
    const modal = document.getElementById('article-picker-modal');
    const modalCloseBtn = document.getElementById('modal-close-btn');
    const articleList = document.getElementById('article-list');
    let selectedArticleUrl = null;

    function closeModal() {
      modal.classList.add('hidden');
      selectedArticleUrl = null;
    }

    modalCloseBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('article-option')) {
        selectedArticleUrl = e.target.getAttribute('data-url');
        closeModal();
        // Re-fetch with selected article
        if (selectedArticleUrl) {
          refetchWithArticle(selectedArticleUrl);
        }
      }
    });

    async function searchArticles(query) {
      try {
        const r = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        const data = await r.json();
        if (data.ok && data.results.length > 0) {
          articleList.innerHTML = data.results.map(art =>
            `<button type="button" class="article-option" data-url="${esc(art.url)}">`
            + `<strong>${esc(art.title)}</strong>`
            + (art.snippet ? `<p>${esc(art.snippet)}</p>` : '')
            + `</button>`
          ).join('');
          modal.classList.remove('hidden');
        }
      } catch (e) {
        log('Could not search articles.');
      }
    }

    async function refetchWithArticle(articleUrl) {
      try {
        const context = await fetch(articleUrl, { method: 'GET' });
        // This is a placeholder; in real use, server would have /api/fetch-article
        log('Article selected.');
      } catch (e) {
        log('Could not load selected article.');
      }
    }
  })();
  </script>
</body>
</html>
